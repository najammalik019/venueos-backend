# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/venueos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:VenueOSSecretKey2026VenueOSSecretKey2026VenueOSSecretKey2026}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Circular references
spring.main.allow-circular-references=true

# Logging
logging.level.com.venueos=INFO